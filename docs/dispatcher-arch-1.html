<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dispatcher — Single Site Architecture</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap');

  :root {
    --bg:       #0d1117;
    --surface:  #161b22;
    --border:   #30363d;
    --text:     #e6edf3;
    --muted:    #7d8590;
    --accent:   #58a6ff;
    --green:    #3fb950;
    --orange:   #d29922;
    --red:      #f85149;
    --purple:   #bc8cff;
    --teal:     #39d353;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 24px 60px;
  }

  header {
    text-align: center;
    margin-bottom: 48px;
  }

  header h1 {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 10px;
  }

  header h2 {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 300;
    font-size: 26px;
    color: var(--text);
    letter-spacing: -0.02em;
  }

  header p {
    margin-top: 10px;
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0.03em;
  }

  .diagram {
    width: 100%;
    max-width: 900px;
    position: relative;
  }

  /* ── LAYERS ── */
  .layer {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    position: relative;
    z-index: 2;
  }

  .layer-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    writing-mode: vertical-rl;
    transform: rotate(180deg);
    width: 20px;
    flex-shrink: 0;
    user-select: none;
  }

  .layer-nodes {
    display: flex;
    gap: 16px;
    flex: 1;
    justify-content: center;
  }

  /* ── NODES ── */
  .node {
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--surface);
    padding: 14px 18px;
    position: relative;
    transition: border-color 0.2s;
    min-width: 140px;
  }

  .node:hover { border-color: var(--accent); }

  .node-icon {
    font-size: 20px;
    margin-bottom: 8px;
    display: block;
  }

  .node-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 4px;
  }

  .node-sub {
    font-size: 11px;
    color: var(--muted);
    line-height: 1.5;
  }

  .node-badge {
    position: absolute;
    top: -8px;
    right: 10px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.12em;
    padding: 2px 6px;
    border-radius: 3px;
    text-transform: uppercase;
  }

  .badge-operator  { background: #1f2d3d; color: var(--accent);  border: 1px solid var(--accent); }
  .badge-dispatch  { background: #1d2a1d; color: var(--green);   border: 1px solid var(--green); }
  .badge-agent     { background: #2a1d1d; color: var(--orange);  border: 1px solid var(--orange); }
  .badge-api       { background: #261d2a; color: var(--purple);  border: 1px solid var(--purple); }

  .node-accent-blue   { border-left: 3px solid var(--accent); }
  .node-accent-green  { border-left: 3px solid var(--green); }
  .node-accent-orange { border-left: 3px solid var(--orange); }
  .node-accent-purple { border-left: 3px solid var(--purple); }

  /* ── CONNECTORS ── */
  .connectors {
    position: relative;
    height: 60px;
    margin: 0;
    z-index: 1;
  }

  .connectors svg {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    overflow: visible;
  }

  /* ── FLOW ANNOTATIONS ── */
  .flow-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-align: center;
    padding: 4px 0;
    letter-spacing: 0.08em;
  }

  .flow-label span {
    display: inline-block;
    background: var(--bg);
    padding: 0 8px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 9px;
    color: var(--muted);
  }

  /* ── LEGEND ── */
  .legend {
    margin-top: 40px;
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
  }

  .legend-line {
    width: 28px;
    height: 2px;
  }

  .legend-line.cmd    { background: var(--accent); }
  .legend-line.result { background: var(--green); }
  .legend-line.cert   { background: var(--orange); border-top: 1px dashed var(--orange); background: transparent; }
  .legend-line.api    { background: var(--purple); }

  /* ── DETAIL PANEL ── */
  .detail-grid {
    margin-top: 40px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    width: 100%;
    max-width: 900px;
  }

  .detail-card {
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px 16px;
    background: var(--surface);
  }

  .detail-card h3 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .detail-card h3.blue   { color: var(--accent); }
  .detail-card h3.green  { color: var(--green); }
  .detail-card h3.orange { color: var(--orange); }
  .detail-card h3.purple { color: var(--purple); }

  .detail-card ul {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .detail-card li {
    font-size: 11px;
    color: var(--muted);
    padding-left: 12px;
    position: relative;
    line-height: 1.5;
  }

  .detail-card li::before {
    content: '›';
    position: absolute;
    left: 0;
    color: var(--border);
  }

  .detail-card code {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text);
    background: var(--bg);
    padding: 1px 4px;
    border-radius: 3px;
  }

  /* ── SVG DIAGRAM ── */
  .svg-diagram {
    width: 100%;
    max-width: 900px;
    margin: 0 auto;
  }

  .caption {
    text-align: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-top: 32px;
    letter-spacing: 0.1em;
  }

  .caption span { color: var(--accent); }

  /* animated dots on lines */
  @keyframes dash-flow {
    from { stroke-dashoffset: 24; }
    to   { stroke-dashoffset: 0; }
  }
  @keyframes dash-flow-rev {
    from { stroke-dashoffset: 0; }
    to   { stroke-dashoffset: 24; }
  }
</style>
</head>
