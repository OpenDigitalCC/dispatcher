<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 620" width="1100" height="620"
     font-family="'Open Sans', 'Helvetica Neue', Helvetica, Arial, sans-serif">

  <defs>
    <marker id="arr-purple" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3F264F"/>
    </marker>
    <marker id="arr-teal" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#32707E"/>
    </marker>
    <marker id="arr-ochre" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#D1A75C"/>
    </marker>
    <marker id="arr-rust" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#B35440"/>
    </marker>
    <marker id="arr-forest" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#43634A"/>
    </marker>
    <marker id="arr-muted" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#C6C6C5"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="620" fill="#FAFAFA"/>

  <!-- Title -->
  <text x="48" y="46" font-size="17" font-weight="700" fill="#3F264F" letter-spacing="0.3">ctrl-exec — The Auth Hook Architecture</text>
  <text x="48" y="66" font-size="11" fill="#777777">The extensibility interface: every invocation passes through the hook before any script executes</text>

  <!-- ═══════════════════════════════════════════════
       TOP — Invocation source
  ════════════════════════════════════════════════ -->

  <rect x="390" y="88" width="200" height="52" rx="3" fill="white" stroke="#C6C6C5" stroke-width="1.5"/>
  <text x="490" y="110" font-size="11" font-weight="700" fill="#3C3C3B" text-anchor="middle">Any Invocation</text>
  <text x="490" y="126" font-size="9" fill="#777777" text-anchor="middle">web UI · API · cron · agent poll</text>

  <!-- Down arrow to hook -->
  <line x1="490" y1="140" x2="490" y2="172" stroke="#3F264F" stroke-width="2" marker-end="url(#arr-purple)"/>
  <text x="506" y="159" font-size="8" fill="#3F264F">every time · no exceptions</text>

  <!-- ═══════════════════════════════════════════════
       AUTH HOOK — centre large
  ════════════════════════════════════════════════ -->

  <rect x="230" y="172" width="520" height="220" rx="4" fill="#FEF9EE" stroke="#D1A75C" stroke-width="3"/>
  <rect x="230" y="172" width="520" height="36" rx="4" fill="#D1A75C"/>
  <rect x="230" y="196" width="520" height="12" fill="#D1A75C"/>
  <text x="490" y="197" font-size="12" font-weight="700" fill="white" text-anchor="middle" letter-spacing="1.5">AUTH HOOK — intercept point</text>

  <!-- What the hook receives — payload panel -->
  <rect x="248" y="216" width="230" height="162" rx="3" fill="white" stroke="#D1A75C" stroke-width="1"/>
  <text x="363" y="234" font-size="10" font-weight="700" fill="#744210" text-anchor="middle">Hook receives on every call</text>
  <line x1="248" y1="240" x2="478" y2="240" stroke="#D1A75C" stroke-width="1" opacity="0.5"/>

  <!-- Payload fields in monospace style -->
  <text x="264" y="258" font-size="9" fill="#3C3C3B" font-family="'Courier New', monospace">DISPATCHER_ARGS_JSON</text>
  <text x="264" y="272" font-size="8" fill="#777777" font-family="'Courier New', monospace">  structured argument payload</text>

  <text x="264" y="290" font-size="9" fill="#3C3C3B" font-family="'Courier New', monospace">token</text>
  <text x="264" y="304" font-size="8" fill="#777777" font-family="'Courier New', monospace">  bearer or API token</text>

  <text x="264" y="322" font-size="9" fill="#3C3C3B" font-family="'Courier New', monospace">username</text>
  <text x="264" y="336" font-size="8" fill="#777777" font-family="'Courier New', monospace">  authenticated identity</text>

  <text x="264" y="354" font-size="9" fill="#3C3C3B" font-family="'Courier New', monospace">hostname</text>
  <text x="264" y="368" font-size="8" fill="#777777" font-family="'Courier New', monospace">  target agent host</text>

  <text x="264" y="372" font-size="9" fill="#3C3C3B" font-family="'Courier New', monospace">script_name</text>

  <!-- Hook capabilities panel -->
  <rect x="496" y="216" width="236" height="162" rx="3" fill="white" stroke="#D1A75C" stroke-width="1"/>
  <text x="614" y="234" font-size="10" font-weight="700" fill="#744210" text-anchor="middle">Hook can implement</text>
  <line x1="496" y1="240" x2="732" y2="240" stroke="#D1A75C" stroke-width="1" opacity="0.5"/>

  <text x="512" y="260" font-size="9" fill="#3C3C3B">credential validation against LDAP/SSO</text>
  <text x="512" y="278" font-size="9" fill="#3C3C3B">RBAC or ABAC policy lookup</text>
  <text x="512" y="296" font-size="9" fill="#3C3C3B">argument-level validation</text>
  <text x="512" y="314" font-size="9" fill="#3C3C3B">time-of-day / IP restrictions</text>
  <text x="512" y="332" font-size="9" fill="#3C3C3B">rate limiting per identity</text>
  <text x="512" y="350" font-size="9" fill="#3C3C3B">real-time external policy query</text>
  <text x="512" y="368" font-size="9" fill="#3C3C3B">custom audit / alerting emit</text>


  <!-- ═══════════════════════════════════════════════
       ARGUMENT-LEVEL POLICY EXAMPLE
  ════════════════════════════════════════════════ -->

  <rect x="40" y="172" width="176" height="220" rx="3" fill="#F4F0F7" stroke="#785A89" stroke-width="1.5"/>
  <text x="128" y="192" font-size="9" font-weight="700" fill="#785A89" text-anchor="middle" letter-spacing="0.5">ARGUMENT-LEVEL POLICY</text>
  <line x1="40" y1="200" x2="216" y2="200" stroke="#785A89" stroke-width="1" opacity="0.4"/>

  <text x="56" y="220" font-size="9" font-weight="700" fill="#3C3C3B">Not just:</text>
  <text x="56" y="236" font-size="8" fill="#3C3C3B">can alice run</text>
  <text x="56" y="249" font-size="8" fill="#3C3C3B" font-family="'Courier New', monospace">backup.sh</text>
  <text x="56" y="262" font-size="8" fill="#3C3C3B">on this host?</text>

  <line x1="56" y1="274" x2="200" y2="274" stroke="#785A89" stroke-width="1" opacity="0.3"/>

  <text x="56" y="292" font-size="9" font-weight="700" fill="#3F264F">But also:</text>
  <text x="56" y="308" font-size="8" fill="#3C3C3B">can alice run</text>
  <text x="56" y="321" font-size="8" fill="#3C3C3B" font-family="'Courier New', monospace">backup.sh</text>
  <text x="56" y="334" font-size="8" fill="#3C3C3B">with</text>
  <text x="56" y="347" font-size="8" fill="#3C3C3B" font-family="'Courier New', monospace">--target=prod</text>
  <text x="56" y="360" font-size="8" fill="#3C3C3B">on this host?</text>
  <text x="56" y="376" font-size="8" fill="#777777">(argument inspected</text>
  <text x="56" y="388" font-size="8" fill="#777777"> by hook)</text>

  <!-- Arrow from example to hook -->
  <line x1="216" y1="280" x2="248" y2="280" stroke="#785A89" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-ochre)"/>

  <!-- ═══════════════════════════════════════════════
       REVOCATION NOTE
  ════════════════════════════════════════════════ -->

  <rect x="884" y="172" width="176" height="220" rx="3" fill="#F4F8F7" stroke="#32707E" stroke-width="1.5"/>
  <text x="972" y="192" font-size="9" font-weight="700" fill="#32707E" text-anchor="middle" letter-spacing="0.5">REAL-TIME REVOCATION</text>
  <line x1="884" y1="200" x2="1060" y2="200" stroke="#32707E" stroke-width="1" opacity="0.4"/>

  <text x="900" y="222" font-size="9" fill="#3C3C3B">Hook is called on every</text>
  <text x="900" y="237" font-size="9" fill="#3C3C3B">invocation, in real time.</text>

  <text x="900" y="260" font-size="9" fill="#3C3C3B">Revoke a token in your</text>
  <text x="900" y="275" font-size="9" fill="#3C3C3B">IAM system and the next</text>
  <text x="900" y="290" font-size="9" fill="#3C3C3B">ctrl-exec call by that</text>
  <text x="900" y="305" font-size="9" fill="#3C3C3B">identity is rejected.</text>

  <text x="900" y="328" font-size="9" fill="#3C3C3B">No cache. No session</text>
  <text x="900" y="343" font-size="9" fill="#3C3C3B">to invalidate. No wait.</text>

  <line x1="900" y1="358" x2="1054" y2="358" stroke="#32707E" stroke-width="1" opacity="0.3"/>
  <text x="972" y="376" font-size="9" fill="#32707E" text-anchor="middle" font-style="italic">revocation is immediate</text>

  <!-- Arrow from hook to revocation note -->
  <line x1="750" y1="280" x2="884" y2="280" stroke="#32707E" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-teal)"/>

  <!-- ═══════════════════════════════════════════════
       DECISION OUTPUTS — below hook
  ════════════════════════════════════════════════ -->

  <!-- Authorised path -->
  <line x1="400" y1="392" x2="340" y2="440" stroke="#43634A" stroke-width="2" marker-end="url(#arr-forest)"/>

  <rect x="240" y="440" width="200" height="80" rx="3" fill="#F0F7F4" stroke="#43634A" stroke-width="2"/>
  <text x="340" y="462" font-size="12" font-weight="700" fill="#43634A" text-anchor="middle">Authorised</text>
  <text x="340" y="480" font-size="9" fill="#3C3C3B" text-anchor="middle">script fetched from library</text>
  <text x="340" y="495" font-size="9" fill="#3C3C3B" text-anchor="middle">hash verified</text>
  <text x="340" y="510" font-size="9" fill="#3C3C3B" text-anchor="middle">dispatched to agent</text>

  <!-- Rejected path -->
  <line x1="580" y1="392" x2="640" y2="440" stroke="#B35440" stroke-width="2" marker-end="url(#arr-rust)"/>

  <rect x="540" y="440" width="200" height="80" rx="3" fill="#FDF6F4" stroke="#B35440" stroke-width="2"/>
  <text x="640" y="462" font-size="12" font-weight="700" fill="#B35440" text-anchor="middle">Rejected</text>
  <text x="640" y="480" font-size="9" fill="#3C3C3B" text-anchor="middle">403 returned to caller</text>
  <text x="640" y="495" font-size="9" fill="#3C3C3B" text-anchor="middle">rejection reason logged</text>
  <text x="640" y="510" font-size="9" fill="#3C3C3B" text-anchor="middle">no script access occurs</text>

  <!-- Decision labels on arrows -->
  <text x="358" y="428" font-size="9" fill="#43634A" font-weight="700">allow</text>
  <text x="618" y="428" font-size="9" fill="#B35440" font-weight="700">deny</text>

  <!-- ═══════════════════════════════════════════════
       PLUGIN IMPLEMENTATIONS — bottom row
  ════════════════════════════════════════════════ -->

  <text x="48" y="558" font-size="9" fill="#777777" font-weight="700" letter-spacing="1">EXAMPLE HOOK IMPLEMENTATIONS</text>

  <rect x="48" y="568" width="148" height="36" rx="3" fill="white" stroke="#C6C6C5" stroke-width="1"/>
  <text x="122" y="584" font-size="9" font-weight="700" fill="#3C3C3B" text-anchor="middle">LDAP / Active Directory</text>
  <text x="122" y="597" font-size="8" fill="#777777" text-anchor="middle">group membership → policy</text>

  <rect x="206" y="568" width="148" height="36" rx="3" fill="white" stroke="#C6C6C5" stroke-width="1"/>
  <text x="280" y="584" font-size="9" font-weight="700" fill="#3C3C3B" text-anchor="middle">Keycloak / OAuth2</text>
  <text x="280" y="597" font-size="8" fill="#777777" text-anchor="middle">token introspection → scopes</text>

  <rect x="364" y="568" width="148" height="36" rx="3" fill="white" stroke="#C6C6C5" stroke-width="1"/>
  <text x="438" y="584" font-size="9" font-weight="700" fill="#3C3C3B" text-anchor="middle">OPA / Open Policy Agent</text>
  <text x="438" y="597" font-size="8" fill="#777777" text-anchor="middle">Rego rules → allow/deny</text>

  <rect x="522" y="568" width="148" height="36" rx="3" fill="white" stroke="#C6C6C5" stroke-width="1"/>
  <text x="596" y="584" font-size="9" font-weight="700" fill="#3C3C3B" text-anchor="middle">Custom script / binary</text>
  <text x="596" y="597" font-size="8" fill="#777777" text-anchor="middle">any language · exits 0 / non-0</text>

  <rect x="680" y="568" width="148" height="36" rx="3" fill="white" stroke="#C6C6C5" stroke-width="1"/>
  <text x="754" y="584" font-size="9" font-weight="700" fill="#3C3C3B" text-anchor="middle">HashiCorp Vault</text>
  <text x="754" y="597" font-size="8" fill="#777777" text-anchor="middle">secret lookup · lease check</text>

  <rect x="838" y="568" width="148" height="36" rx="3" fill="white" stroke="#C6C6C5" stroke-width="1"/>
  <text x="912" y="584" font-size="9" font-weight="700" fill="#3C3C3B" text-anchor="middle">Flat file / YAML</text>
  <text x="912" y="597" font-size="8" fill="#777777" text-anchor="middle">simple deployments · no IAM</text>

  <!-- caption -->
  <text x="1055" y="616" font-size="9" fill="#C6C6C5" text-anchor="end">ctrl-exec.run</text>

</svg>
