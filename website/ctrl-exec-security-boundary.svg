<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 620" width="1100" height="620"
     font-family="'Open Sans', 'Helvetica Neue', Helvetica, Arial, sans-serif">

  <defs>
    <marker id="arr-purple" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3F264F"/>
    </marker>
    <marker id="arr-teal" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#32707E"/>
    </marker>
    <marker id="arr-rust" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#B35440"/>
    </marker>
    <marker id="arr-forest" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#43634A"/>
    </marker>
    <marker id="arr-ochre" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#D1A75C"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="620" fill="#FAFAFA"/>

  <!-- Title -->
  <text x="48" y="46" font-size="17" font-weight="700" fill="#3F264F" letter-spacing="0.3">ctrl-exec — The Security Boundary</text>
  <text x="48" y="66" font-size="11" fill="#777777">Operational surface reduction: not access control on top of a shell, but structural absence of a shell</text>

  <!-- ═══════════════════════════════════════════════
       LEFT PANEL — SSH model (what ctrl-exec replaces)
  ════════════════════════════════════════════════ -->

  <!-- Panel background -->
  <rect x="40" y="88" width="440" height="460" rx="4" fill="#FDF6F4" stroke="#B35440" stroke-width="2"/>
  <rect x="40" y="88" width="440" height="36" rx="4" fill="#B35440"/>
  <rect x="40" y="108" width="440" height="16" fill="#B35440"/>
  <text x="260" y="112" font-size="12" font-weight="700" fill="white" text-anchor="middle" letter-spacing="1">SSH MODEL — broad surface</text>

  <!-- Operator -->
  <rect x="64" y="144" width="140" height="52" rx="3" fill="white" stroke="#C6C6C5" stroke-width="1.5"/>
  <text x="134" y="166" font-size="11" font-weight="700" fill="#3C3C3B" text-anchor="middle">Operator</text>
  <text x="134" y="182" font-size="9" fill="#777777" text-anchor="middle">username + password / key</text>

  <!-- Arrow to shell -->
  <line x1="204" y1="170" x2="270" y2="170" stroke="#B35440" stroke-width="2" marker-end="url(#arr-rust)"/>
  <text x="237" y="163" font-size="8" fill="#B35440" text-anchor="middle">SSH :22</text>

  <!-- Shell box -->
  <rect x="270" y="140" width="180" height="60" rx="3" fill="#B35440" fill-opacity="0.12" stroke="#B35440" stroke-width="2"/>
  <text x="360" y="162" font-size="13" font-weight="700" fill="#B35440" text-anchor="middle">Shell</text>
  <text x="360" y="178" font-size="9" fill="#B35440" text-anchor="middle">full terminal session</text>
  <text x="360" y="191" font-size="9" fill="#B35440" text-anchor="middle">interactive prompt</text>

  <!-- What shell exposes -->
  <text x="260" y="230" font-size="10" font-weight="700" fill="#3C3C3B">Once authenticated, the operator can reach:</text>

  <rect x="64" y="244" width="392" height="200" rx="3" fill="white" stroke="#C6C6C5" stroke-width="1"/>

  <!-- Surface items - showing breadth of exposure -->
  <text x="80" y="264" font-size="10" fill="#B35440">✕  any command the OS permits</text>
  <text x="80" y="282" font-size="10" fill="#B35440">✕  any file readable by the user</text>
  <text x="80" y="300" font-size="10" fill="#B35440">✕  any process they can signal</text>
  <text x="80" y="318" font-size="10" fill="#B35440">✕  any script they can write or upload</text>
  <text x="80" y="336" font-size="10" fill="#B35440">✕  lateral movement via further SSH</text>
  <text x="80" y="354" font-size="10" fill="#B35440">✕  environment inspection and modification</text>
  <text x="80" y="372" font-size="10" fill="#B35440">✕  credential harvest from process table</text>
  <text x="80" y="390" font-size="10" fill="#B35440">✕  log modification and audit evasion</text>

  <text x="260" y="422" font-size="9" fill="#777777" text-anchor="middle" font-style="italic">Access controls restrict what they may do.</text>
  <text x="260" y="436" font-size="9" fill="#777777" text-anchor="middle" font-style="italic">The surface itself remains fully exposed.</text>


  <!-- ═══════════════════════════════════════════════
       RIGHT PANEL — ctrl-exec model
  ════════════════════════════════════════════════ -->

  <rect x="620" y="88" width="440" height="460" rx="4" fill="#F4F8F7" stroke="#32707E" stroke-width="2"/>
  <rect x="620" y="88" width="440" height="36" rx="4" fill="#32707E"/>
  <rect x="620" y="108" width="440" height="16" fill="#32707E"/>
  <text x="840" y="112" font-size="12" font-weight="700" fill="white" text-anchor="middle" letter-spacing="1">DISPATCHER MODEL — bounded surface</text>

  <!-- Operator -->
  <rect x="644" y="144" width="140" height="52" rx="3" fill="white" stroke="#C6C6C5" stroke-width="1.5"/>
  <text x="714" y="166" font-size="11" font-weight="700" fill="#3C3C3B" text-anchor="middle">Operator</text>
  <text x="714" y="182" font-size="9" fill="#777777" text-anchor="middle">token / credential</text>

  <!-- mTLS boundary — drawn as a thick hard perimeter zone -->
  <rect x="800" y="130" width="240" height="108" rx="0" fill="none" stroke="#3F264F" stroke-width="4"/>
  <!-- Corner markers to emphasise hardness -->
  <rect x="798" y="128" width="12" height="12" fill="#3F264F"/>
  <rect x="1028" y="128" width="12" height="12" fill="#3F264F"/>
  <rect x="798" y="226" width="12" height="12" fill="#3F264F"/>
  <rect x="1028" y="226" width="12" height="12" fill="#3F264F"/>
  <text x="920" y="120" font-size="8" font-weight="700" fill="#3F264F" text-anchor="middle" letter-spacing="1.5">mTLS PERIMETER</text>
  <text x="920" y="248" font-size="8" fill="#3F264F" text-anchor="middle">mutual certificate verification — both ends authenticated</text>

  <!-- API endpoint inside mTLS -->
  <rect x="816" y="140" width="208" height="46" rx="3" fill="#3F264F" fill-opacity="0.08" stroke="#3F264F" stroke-width="1.5"/>
  <text x="920" y="158" font-size="11" font-weight="700" fill="#3F264F" text-anchor="middle">ctrl-exec API</text>
  <text x="920" y="174" font-size="9" fill="#3F264F" text-anchor="middle">named operations only · no shell · no prompt</text>

  <!-- Auth hook intercept -->
  <rect x="816" y="196" width="208" height="34" rx="3" fill="#D1A75C" fill-opacity="0.2" stroke="#D1A75C" stroke-width="2"/>
  <text x="920" y="210" font-size="10" font-weight="700" fill="#744210" text-anchor="middle">▶ Auth Hook intercept</text>
  <text x="920" y="224" font-size="9" fill="#744210" text-anchor="middle">every invocation · before execution</text>

  <!-- Arrow operator → API -->
  <line x1="784" y1="170" x2="800" y2="163" stroke="#32707E" stroke-width="2" marker-end="url(#arr-teal)"/>
  <text x="790" y="158" font-size="8" fill="#32707E" text-anchor="middle">HTTPS</text>

  <!-- What ctrl-exec exposes -->
  <text x="840" y="278" font-size="10" font-weight="700" fill="#3C3C3B">Once authenticated, the operator can reach:</text>

  <rect x="644" y="292" width="392" height="164" rx="3" fill="white" stroke="#C6C6C5" stroke-width="1"/>

  <!-- Named operations list - finite, explicit -->
  <text x="660" y="316" font-size="10" fill="#43634A">✓  restart-nginx</text>
  <text x="660" y="334" font-size="10" fill="#43634A">✓  run-db-backup</text>
  <text x="660" y="352" font-size="10" fill="#43634A">✓  check-disk-usage</text>
  <text x="660" y="370" font-size="10" fill="#43634A">✓  rotate-logs</text>
  <text x="660" y="388" font-size="10" fill="#43634A">✓  deploy-release --tag v2.4.1</text>

  <!-- Hard boundary line -->
  <line x1="660" y1="400" x2="1020" y2="400" stroke="#B35440" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="840" y="418" font-size="9" fill="#B35440" text-anchor="middle" font-weight="700">everything not on this list is structurally unreachable</text>
  <text x="840" y="432" font-size="9" fill="#777777" text-anchor="middle">not forbidden — absent. No shell. No path to it.</text>
  <text x="840" y="448" font-size="9" fill="#777777" text-anchor="middle">Argument-level policy applied per invocation by auth hook.</text>

  <!-- VS divider in centre -->
  <line x1="540" y1="100" x2="540" y2="548" stroke="#C6C6C5" stroke-width="1" stroke-dasharray="6,4"/>
  <rect x="519" y="290" width="42" height="42" rx="21" fill="#3C3C3B"/>
  <text x="540" y="316" font-size="13" font-weight="700" fill="white" text-anchor="middle">vs</text>

  <!-- ═══════════════════════════════════════════════
       BOTTOM — key principle statement
  ════════════════════════════════════════════════ -->
  <rect x="40" y="562" width="1020" height="44" rx="3" fill="#3F264F"/>
  <text x="550" y="580" font-size="11" font-weight="700" fill="white" text-anchor="middle">
    SSH gives you a shell. ctrl-exec gives you a named list of permitted operations.
  </text>
  <text x="550" y="598" font-size="10" fill="#C6C6C5" text-anchor="middle">
    Anything not on that list is structurally unreachable — not just forbidden.
  </text>

  <!-- caption -->
  <text x="1055" y="616" font-size="9" fill="#C6C6C5" text-anchor="end">ctrl-exec.run</text>

</svg>
