<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 620" width="1100" height="620" font-family="'Courier New', Courier, monospace">

  <defs>
    <marker id="arr-dark" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2d3748"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2b6cb0"/>
    </marker>
    <marker id="arr-amber" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#b7791f"/>
    </marker>
    <marker id="arr-muted" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#a0aec0"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#276749"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="620" fill="#f7f8fa"/>

  <!-- Title -->
  <text x="48" y="48" font-size="18" font-weight="bold" fill="#1a202c" letter-spacing="0.5">ctrl-exec — Technical Architecture</text>
  <text x="48" y="68" font-size="11" fill="#718096" letter-spacing="0.2">agent-based remote execution with centralised policy enforcement</text>


  <!-- ═══════════════════════════════════════════════
       OPERATOR COLUMN (left)
  ════════════════════════════════════════════════ -->

  <!-- System administrator -->
  <rect x="40" y="100" width="170" height="58" rx="3" fill="white" stroke="#cbd5e0" stroke-width="1.5"/>
  <text x="125" y="122" font-size="11" font-weight="bold" fill="#2d3748" text-anchor="middle">System Administrator</text>
  <text x="125" y="139" font-size="9" fill="#718096" text-anchor="middle">configures permitted</text>
  <text x="125" y="151" font-size="9" fill="#718096" text-anchor="middle">scripts and policies</text>

  <!-- Operator / user -->
  <rect x="40" y="210" width="170" height="58" rx="3" fill="white" stroke="#cbd5e0" stroke-width="1.5"/>
  <text x="125" y="232" font-size="11" font-weight="bold" fill="#2d3748" text-anchor="middle">Operator</text>
  <text x="125" y="249" font-size="9" fill="#718096" text-anchor="middle">issues commands via</text>
  <text x="125" y="261" font-size="9" fill="#718096" text-anchor="middle">web UI or API</text>

  <!-- Browser label -->
  <text x="125" y="290" font-size="9" fill="#a0aec0" text-anchor="middle" font-style="italic">HTTPS :443</text>


  <!-- ═══════════════════════════════════════════════
       DISPATCHER HOST (centre)
  ════════════════════════════════════════════════ -->

  <!-- Host boundary -->
  <rect x="270" y="88" width="360" height="420" rx="4" fill="#ebf4ff" stroke="#90cdf4" stroke-width="1.5"/>
  <text x="450" y="108" font-size="9" fill="#2b6cb0" text-anchor="middle" letter-spacing="1.5" font-weight="bold">DISPATCHER HOST</text>

  <!-- Web Interface component -->
  <rect x="288" y="118" width="150" height="64" rx="3" fill="white" stroke="#90cdf4" stroke-width="1.5"/>
  <text x="363" y="140" font-size="11" font-weight="bold" fill="#1a365d" text-anchor="middle">Web Interface</text>
  <text x="363" y="156" font-size="9" fill="#4a90d9" text-anchor="middle">session management</text>
  <text x="363" y="169" font-size="9" fill="#4a90d9" text-anchor="middle">command submission</text>

  <!-- API component -->
  <rect x="458" y="118" width="150" height="64" rx="3" fill="white" stroke="#90cdf4" stroke-width="1.5"/>
  <text x="533" y="140" font-size="11" font-weight="bold" fill="#1a365d" text-anchor="middle">REST API</text>
  <text x="533" y="156" font-size="9" fill="#4a90d9" text-anchor="middle">token auth</text>
  <text x="533" y="169" font-size="9" fill="#4a90d9" text-anchor="middle">programmatic access</text>

  <!-- Internal arrow: web/api → auth hook -->
  <line x1="363" y1="182" x2="363" y2="210" stroke="#90cdf4" stroke-width="1" marker-end="url(#arr-blue)"/>
  <line x1="533" y1="182" x2="533" y2="210" stroke="#90cdf4" stroke-width="1" marker-end="url(#arr-blue)"/>
  <line x1="363" y1="210" x2="533" y2="210" stroke="#90cdf4" stroke-width="1"/>

  <!-- Auth Hook -->
  <rect x="338" y="218" width="224" height="90" rx="3" fill="#fffbeb" stroke="#f6ad55" stroke-width="2"/>
  <text x="450" y="240" font-size="12" font-weight="bold" fill="#744210" text-anchor="middle">Auth Hook</text>
  <text x="450" y="257" font-size="9" fill="#975a16" text-anchor="middle">1. validate credentials</text>
  <text x="450" y="271" font-size="9" fill="#975a16" text-anchor="middle">2. check command against policy</text>
  <text x="450" y="285" font-size="9" fill="#975a16" text-anchor="middle">3. write audit entry</text>
  <text x="450" y="299" font-size="9" fill="#975a16" text-anchor="middle">4. authorise or reject</text>

  <!-- Auth Hook → IAM -->
  <line x1="338" y1="258" x2="288" y2="258" stroke="#b7791f" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-amber)"/>
  <!-- IAM label box -->
  <rect x="222" y="244" width="66" height="30" rx="2" fill="#fefcbf" stroke="#f6ad55" stroke-width="1"/>
  <text x="255" y="258" font-size="9" fill="#744210" text-anchor="middle" font-weight="bold">LDAP /</text>
  <text x="255" y="270" font-size="9" fill="#744210" text-anchor="middle">SSO / IAM</text>

  <!-- Script Library -->
  <rect x="288" y="330" width="150" height="72" rx="3" fill="white" stroke="#cbd5e0" stroke-width="1.5"/>
  <text x="363" y="352" font-size="11" font-weight="bold" fill="#2d3748" text-anchor="middle">Script Library</text>
  <text x="363" y="368" font-size="9" fill="#718096" text-anchor="middle">pre-approved scripts only</text>
  <text x="363" y="381" font-size="9" fill="#718096" text-anchor="middle">versioned · hash-verified</text>
  <text x="363" y="394" font-size="9" fill="#718096" text-anchor="middle">owner-assigned per host</text>

  <!-- ctrl-exec Engine -->
  <rect x="458" y="330" width="150" height="72" rx="3" fill="white" stroke="#cbd5e0" stroke-width="1.5"/>
  <text x="533" y="352" font-size="11" font-weight="bold" fill="#2d3748" text-anchor="middle">Dispatch Engine</text>
  <text x="533" y="368" font-size="9" fill="#718096" text-anchor="middle">queue management</text>
  <text x="533" y="381" font-size="9" fill="#718096" text-anchor="middle">agent targeting</text>
  <text x="533" y="394" font-size="9" fill="#718096" text-anchor="middle">result aggregation</text>

  <!-- Auth → Script lib / engine -->
  <line x1="410" y1="308" x2="363" y2="330" stroke="#90cdf4" stroke-width="1" marker-end="url(#arr-blue)"/>
  <line x1="490" y1="308" x2="533" y2="330" stroke="#90cdf4" stroke-width="1" marker-end="url(#arr-blue)"/>

  <!-- ctrl-exec DB / state -->
  <rect x="338" y="422" width="224" height="60" rx="3" fill="white" stroke="#e2e8f0" stroke-width="1.5" stroke-dasharray="none"/>
  <text x="450" y="446" font-size="11" font-weight="bold" fill="#2d3748" text-anchor="middle">State Store</text>
  <text x="450" y="462" font-size="9" fill="#718096" text-anchor="middle">job queue · audit log · results cache</text>
  <text x="450" y="475" font-size="9" fill="#718096" text-anchor="middle">SQLite / Postgres</text>

  <!-- Engine → state store -->
  <line x1="533" y1="402" x2="533" y2="422" stroke="#e2e8f0" stroke-width="1.5" marker-end="url(#arr-muted)"/>
  <line x1="363" y1="402" x2="363" y2="422" stroke="#e2e8f0" stroke-width="1.5" marker-end="url(#arr-muted)"/>


  <!-- ═══════════════════════════════════════════════
       REMOTE HOSTS (right)
  ════════════════════════════════════════════════ -->

  <!-- Web server -->
  <rect x="740" y="100" width="300" height="110" rx="3" fill="white" stroke="#cbd5e0" stroke-width="1.5"/>
  <text x="890" y="124" font-size="12" font-weight="bold" fill="#2d3748" text-anchor="middle">Web Server</text>
  <rect x="758" y="134" width="264" height="34" rx="2" fill="#f0fff4" stroke="#9ae6b4" stroke-width="1"/>
  <text x="890" y="149" font-size="10" font-weight="bold" fill="#276749" text-anchor="middle">ctrl-exec Agent</text>
  <text x="890" y="162" font-size="9" fill="#48bb78" text-anchor="middle">polling · execution · reporting</text>
  <text x="890" y="186" font-size="9" fill="#a0aec0" text-anchor="middle">nginx · apache · OS scripts</text>
  <text x="890" y="198" font-size="9" fill="#a0aec0" text-anchor="middle">executes authorised scripts only</text>

  <!-- DB server -->
  <rect x="740" y="240" width="300" height="110" rx="3" fill="white" stroke="#cbd5e0" stroke-width="1.5"/>
  <text x="890" y="264" font-size="12" font-weight="bold" fill="#2d3748" text-anchor="middle">Database Server</text>
  <rect x="758" y="274" width="264" height="34" rx="2" fill="#f0fff4" stroke="#9ae6b4" stroke-width="1"/>
  <text x="890" y="289" font-size="10" font-weight="bold" fill="#276749" text-anchor="middle">ctrl-exec Agent</text>
  <text x="890" y="302" font-size="9" fill="#48bb78" text-anchor="middle">polling · execution · reporting</text>
  <text x="890" y="326" font-size="9" fill="#a0aec0" text-anchor="middle">backup · vacuum · replication checks</text>
  <text x="890" y="338" font-size="9" fill="#a0aec0" text-anchor="middle">executes authorised scripts only</text>

  <!-- App server -->
  <rect x="740" y="380" width="300" height="110" rx="3" fill="white" stroke="#cbd5e0" stroke-width="1.5"/>
  <text x="890" y="404" font-size="12" font-weight="bold" fill="#2d3748" text-anchor="middle">Application Server</text>
  <rect x="758" y="414" width="264" height="34" rx="2" fill="#f0fff4" stroke="#9ae6b4" stroke-width="1"/>
  <text x="890" y="429" font-size="10" font-weight="bold" fill="#276749" text-anchor="middle">ctrl-exec Agent</text>
  <text x="890" y="442" font-size="9" fill="#48bb78" text-anchor="middle">polling · execution · reporting</text>
  <text x="890" y="466" font-size="9" fill="#a0aec0" text-anchor="middle">deploy · restart · health check</text>
  <text x="890" y="478" font-size="9" fill="#a0aec0" text-anchor="middle">executes authorised scripts only</text>


  <!-- ═══════════════════════════════════════════════
       FLOW ARROWS — operators to host
  ════════════════════════════════════════════════ -->

  <!-- Admin → Web Interface (HTTPS) -->
  <line x1="210" y1="128" x2="288" y2="150" stroke="#2d3748" stroke-width="1.5" marker-end="url(#arr-dark)"/>
  <text x="246" y="133" font-size="8" fill="#4a5568" text-anchor="middle">HTTPS</text>

  <!-- Operator → Web Interface -->
  <line x1="210" y1="238" x2="288" y2="165" stroke="#2d3748" stroke-width="1.5" marker-end="url(#arr-dark)"/>


  <!-- ═══════════════════════════════════════════════
       FLOW ARROWS — host to agents (dispatch)
       and agent callbacks (poll + credential validation)
  ════════════════════════════════════════════════ -->

  <!-- Dispatch engine → web server agent (command push) -->
  <!-- Using offset paths for up/down separation -->

  <!-- Web server: dispatch command (host → agent) -->
  <line x1="630" y1="358" x2="740" y2="150" stroke="#2b6cb0" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- Web server: agent poll / callback (agent → host) -->
  <path d="M 740,168 C 700,168 680,370 630,372" fill="none" stroke="#276749" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-green)"/>

  <!-- DB server: dispatch command -->
  <line x1="630" y1="365" x2="740" y2="295" stroke="#2b6cb0" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- DB server: agent poll / callback -->
  <path d="M 740,310 C 710,310 685,375 630,378" fill="none" stroke="#276749" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-green)"/>

  <!-- App server: dispatch command -->
  <line x1="630" y1="372" x2="740" y2="430" stroke="#2b6cb0" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- App server: agent poll / callback -->
  <path d="M 740,448 C 700,448 680,385 630,385" fill="none" stroke="#276749" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-green)"/>

  <!-- Credential validation: agent → auth hook (amber dashed) -->
  <!-- Web server agent → auth hook -->
  <path d="M 740,140 C 715,115 620,115 562,230" fill="none" stroke="#b7791f" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arr-amber)"/>

  <!-- DB server agent → auth hook -->
  <path d="M 740,280 C 720,260 640,245 562,255" fill="none" stroke="#b7791f" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arr-amber)"/>

  <!-- App server agent → auth hook -->
  <path d="M 740,420 C 720,380 640,310 562,285" fill="none" stroke="#b7791f" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arr-amber)"/>


  <!-- ═══════════════════════════════════════════════
       FLOW LABELS on dispatch/callback lines
  ════════════════════════════════════════════════ -->
  <rect x="640" y="270" width="88" height="14" rx="2" fill="#ebf4ff"/>
  <text x="684" y="281" font-size="8" fill="#2b6cb0" text-anchor="middle">script + params dispatched</text>

  <rect x="640" y="316" width="88" height="14" rx="2" fill="#f0fff4"/>
  <text x="684" y="327" font-size="8" fill="#276749" text-anchor="middle">poll · result returned</text>

  <rect x="660" y="132" width="74" height="14" rx="2" fill="#fefcbf"/>
  <text x="697" y="143" font-size="8" fill="#b7791f" text-anchor="middle">credential check</text>


  <!-- ═══════════════════════════════════════════════
       LEGEND
  ════════════════════════════════════════════════ -->
  <rect x="40" y="532" width="720" height="70" rx="3" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="56" y="550" font-size="9" fill="#718096" font-weight="bold" letter-spacing="0.5">FLOW KEY</text>

  <!-- operator request -->
  <line x1="56" y1="566" x2="96" y2="566" stroke="#2d3748" stroke-width="1.5" marker-end="url(#arr-dark)"/>
  <text x="104" y="570" font-size="9" fill="#2d3748">operator request (HTTPS)</text>

  <!-- command dispatch -->
  <line x1="56" y1="585" x2="96" y2="585" stroke="#2b6cb0" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="104" y="589" font-size="9" fill="#2b6cb0">script + params dispatched to agent</text>

  <!-- poll / result -->
  <line x1="260" y1="566" x2="300" y2="566" stroke="#276749" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-green)"/>
  <text x="308" y="570" font-size="9" fill="#276749">agent poll / result returned</text>

  <!-- credential validation -->
  <line x1="260" y1="585" x2="300" y2="585" stroke="#b7791f" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arr-amber)"/>
  <text x="308" y="589" font-size="9" fill="#b7791f">credential validation (agent → auth hook)</text>

  <!-- IAM note -->
  <rect x="520" y="556" width="10" height="10" rx="1" fill="#fefcbf" stroke="#f6ad55" stroke-width="1"/>
  <text x="536" y="565" font-size="9" fill="#975a16">auth hook delegates to existing LDAP / SSO / IAM — no separate credential store required</text>
  <text x="536" y="582" font-size="9" fill="#a0aec0">agents never receive credentials directly · all policy enforced at host · outbound-only agent connections</text>

  <!-- caption -->
  <text x="1055" y="612" font-size="9" fill="#cbd5e0" text-anchor="end">ctrl-exec.run</text>

</svg>
